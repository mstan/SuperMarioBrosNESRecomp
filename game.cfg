# game.cfg — Super Mario Bros. (NES, Mapper 0 / NROM, 2 PRG banks, 1 CHR ROM bank)
output_prefix super-mario-bros

# Mapper 0 (NROM): no bank switching, no trampolines.
# 32KB PRG ROM maps directly to $8000-$FFFF.
# All functions discoverable via standard JSR/RTS graph walk.

# SMB inline indexed dispatch: JSR $8E04 pops return address to find a
# 2-byte LE address table immediately after the JSR. Dispatches via A register.
inline_dispatch 8E04

# Enemy state determination function — only reached via cross-function
# branches (BNE/BEQ from $D8FD, $D90C, $D911 etc.), never via JSR.
# Without this, goomba stomps and enemy interactions silently fail.
extra_func -1 D969

# Widescreen: hook screen boundary reads so extras.c can extend the
# spawning/despawning range when widescreen is active.
# ScreenRight: $071B = PageLoc, $071D = X_Pos
ram_read_hook 071B
ram_read_hook 071D
