name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure CMake
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Copy-Item "build\Release\SuperMarioBrosNESRecomp.exe" release\
          Copy-Item "build\Release\SDL2.dll"                    release\
          @"
          Super Mario Bros. — Static Recompilation
          =========================================
          1. Run SuperMarioBrosNESRecomp.exe
          2. When prompted, select your Super Mario Bros. (World) ROM file (.nes)
          3. The ROM path is remembered for future launches

          Controls: keyboard/gamepad via SDL2 (arrow keys, Z=A, X=B, Enter=Start, Shift=Select)
          Screenshots: saved to C:\temp\nes_shot_*.png every 60 frames
          Save state: F6 to save, F7 to load, F5 to toggle turbo

          ROM not included — provide your own dump of the original cartridge.
          "@ | Out-File -FilePath release\README.txt -Encoding utf8
          Compress-Archive -Path release\* -DestinationPath SuperMarioBrosNESRecomp-windows-x64.zip

      - name: Upload artifact (all builds)
        uses: actions/upload-artifact@v4
        with:
          name: SuperMarioBrosNESRecomp-windows-x64
          path: release/

      - name: Create GitHub Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: SuperMarioBrosNESRecomp-windows-x64.zip
          generate_release_notes: true
