# game.toml — Super Mario Bros. (NES, Mapper 0 / NROM, 2 PRG banks, 1 CHR ROM bank)

[game]
output_prefix = "super-mario-bros"

# SMB inline indexed dispatch: JSR $8E04 pops return address to find a
# 2-byte LE address table immediately after the JSR. Dispatches via A register.
[[inline_dispatch]]
addr = 0x8E04

[functions]
fixed = [
    # Previously known
    0xD969,  # EnemyStateDetermination — cross-function branch target

    # --- From SMBDIS.ASM (https://gist.github.com/1wErt3r/4048722) ---
    # JMP-only / dispatch-table-only targets not reachable via JSR chain.

    # Game mode & demo
    0x8233, 0x82BD, 0x82C2, 0x82DB, 0x838E, 0x8426, 0x9239, 0x9287, 0xAF27,
    # VRAM / PPU helpers
    0x85D9, 0x8653, 0x8660, 0x86DB, 0x8759, 0x8762, 0x8944, 0x89D1,
    # Level object rendering
    0x8F8A, 0x94AC, 0x9593, 0x9596, 0x9639, 0x963D, 0x97D4, 0x97DA,
    0x9A25, 0x9A4A, 0x9A5C, 0x9A80, 0x9A84, 0x9A9B, 0x9B5C, 0x9B6F,
    # Player control & physics
    0xAFB7, 0xB053, 0xB148, 0xB281, 0xB2CE, 0xB396, 0xB43A, 0xB5C8,
    0xB60E, 0xB67C, 0xB6DE, 0xB92C, 0xB9A9, 0xB9DA, 0xBB33, 0xBB48,
    0xC0D6, 0xE1AC, 0xE1DC, 0xE23E, 0xE329,
    # Player graphics
    0xF477, 0xF4B9, 0xF4C0, 0xF522, 0xF595, 0xF6DE,
    # Enemies: spawning & AI
    0xBC57, 0xBC9E, 0xBD35, 0xBD8C, 0xBE33, 0xBEDB, 0xC0FA, 0xC0FF,
    0xC101, 0xC11E, 0xC15D, 0xC268, 0xC3C1, 0xC3FD, 0xC408, 0xC40B,
    0xC4CE, 0xC923, 0xCAA7, 0xDE19, 0xDEAE, 0xE4E6, 0xE4E9, 0xEDFA,
    0xEE5B, 0xEE69, 0xEE7D, 0xEF97, 0xED76,
    # Collision / bounding box
    0xC516, 0xC518, 0xC724, 0xC8DC, 0xC9F0, 0xC9F2, 0xCA47, 0xCA4A,
    0xCA67, 0xCA81, 0xCC6B, 0xCC90, 0xCD2E, 0xCF37, 0xD079, 0xD0C7,
    0xD3D2, 0xD3FE, 0xD442, 0xD90F, 0xD93C, 0xD98A, 0xE094, 0xE57E,
    0xE65A, 0xE6E8, 0xE7B1, 0xE7B3, 0xE83F,
    # Fireball / flame / gfx
    0xC81A, 0xD410, 0xF118, 0xF144, 0xF38C,
    # Platform / objects
    0xD61A, 0xD7A9, 0xD804, 0xD835, 0xD89F, 0xD8C4, 0xDB3C, 0xDB88,
    0xDD56, 0xDD5C, 0xDD66, 0xE1B2, 0xE1BB, 0xE4C8, 0xEAE1,
    # Offscreen bits
    0xE686, 0xF611, 0xF617, 0xF693,
    # Sound / music engine
    0xF914, 0xF99E, 0xF9DA, 0xF9DF, 0xFB2B, 0xFB5D, 0xFBCB,
]
bank0 = [
    0xB308,  # JSR target missing definition — bank0 explicit for correct suffix
]
